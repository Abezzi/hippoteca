name: Deploy Hippoteca to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # Required for workload identity auth

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE=$$   {{ secrets.GCP_REGION }}-docker.pkg.dev/   $${{ secrets.GCP_PROJECT_ID }}/$$   {{ secrets.GCP_ARTIFACT_REPO }}/hippoteca:   $${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=$$   {{ secrets.GCP_REGION }}-docker.pkg.dev/   $${{ secrets.GCP_PROJECT_ID }}/$$   {{ secrets.GCP_ARTIFACT_REPO }}/hippoteca:   $${{ github.sha }}
          gcloud run deploy hippoteca \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet
